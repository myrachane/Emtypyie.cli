name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-node:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          echo "VTAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Cache pkg binaries
        uses: actions/cache@v4
        with:
          path: ~\.pkg-cache
          key: pkg-cache-${{ runner.os }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: archive/${{ steps.version.outputs.VTAG }}/Root4node
        run: npm ci

      - name: Build standalone executable (pkg)
        working-directory: archive/${{ steps.version.outputs.VTAG }}/Root4node
        run: npm run build

      - name: Package Windows x64 ZIP
        shell: pwsh
        run: |
          $vtag = "${{ steps.version.outputs.VTAG }}"
          $version = "${{ steps.version.outputs.VERSION }}"
          $src = "archive/$vtag/Root4node/dist/emtypyie.exe"
          $zip = "archive/$vtag/Root4node/dist/emtypyie-cli-windows-x64-$version.zip"
          Compress-Archive -Path $src -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  emtypyie-cli-windows-x64-$version.zip" | Out-File -FilePath "$zip.sha256" -Encoding ascii

      - name: Upload Node.js ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: archive/${{ steps.version.outputs.VTAG }}/Root4node/dist/emtypyie-cli-windows-x64-${{ steps.version.outputs.VERSION }}.zip*
          if-no-files-found: error

  build-c:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          echo "VTAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up MSYS2 (mingw-w64 gcc/g++)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake

      - name: Build C native executable
        shell: msys2 {0}
        run: |
          cd "archive/${{ steps.version.outputs.VTAG }}/Root4c"
          SRC=src
          LIB=lib
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o main.o $SRC/main.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o shell.o $SRC/shell.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o theme.o $SRC/theme.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o util.o $SRC/util.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o fetch.o $SRC/fetch.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o download.o $SRC/download.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o project.o $SRC/project.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o bakafetch.o $SRC/bakafetch.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o runtime.o $SRC/runtime.c
          gcc -std=c11 -Wall -Wextra -Wno-unused-parameter -I $SRC -I $LIB -c -o auth.o $SRC/auth.c
          g++ -std=c++17 -Wall -Wextra -I $SRC -I $LIB -c -o larpino.o $SRC/larpino.cpp
          gcc -c -I $LIB -o cJSON.o $LIB/cJSON.c
          g++ -o emtypyie.exe main.o shell.o theme.o util.o fetch.o download.o project.o bakafetch.o runtime.o auth.o larpino.o cJSON.o -lwinhttp -lstdc++

      - name: Package native Windows x64 ZIP
        shell: pwsh
        run: |
          $vtag = "${{ steps.version.outputs.VTAG }}"
          $version = "${{ steps.version.outputs.VERSION }}"
          $src = "archive/$vtag/Root4c/emtypyie.exe"
          $zip = "archive/$vtag/Root4c/emtypyie-cli-native-windows-x64-$version.zip"
          Compress-Archive -Path $src -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  emtypyie-cli-native-windows-x64-$version.zip" | Out-File -FilePath "$zip.sha256" -Encoding ascii

      - name: Upload C native ZIP
        uses: actions/upload-artifact@v4
        with:
          name: c-build
          path: archive/${{ steps.version.outputs.VTAG }}/Root4c/emtypyie-cli-native-windows-x64-${{ steps.version.outputs.VERSION }}.zip*
          if-no-files-found: error

  create-release:
    needs: [build-node, build-c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-build
          path: node-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: c-build
          path: c-artifacts

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            node-artifacts/*
            c-artifacts/*

      - name: Remove auto-generated source archives
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="emtypyie-cli"
          gh release delete-asset "$TAG" "${REPO}-${TAG}.zip" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" "${REPO}-${TAG}.tar.gz" --yes 2>/dev/null || true

  publish-npm:
    needs: build-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        working-directory: archive/${{ github.ref_name }}/Root4node
        run: npm ci
      - name: Publish to npm
        working-directory: archive/${{ github.ref_name }}/Root4node
        run: npm publish || echo "npm publish skipped (version may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-winget:
    needs: build-c
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download wingetcreate
        run: Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "wingetcreate.exe"

      - name: Submit update to winget-pkgs
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installerUrl = "https://github.com/myrachane/emtypyie-cli/releases/download/v$version/emtypyie-cli-native-windows-x64-$version.zip"
          .\wingetcreate.exe update myrachane.emtypyie-cli --version $version --urls $installerUrl --submit --token $env:GITHUB_TOKEN
