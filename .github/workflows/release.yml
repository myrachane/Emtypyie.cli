name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-node:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    defaults:
      run:
        working-directory: root4node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache pkg binaries
        id: cache-pkg
        uses: actions/cache@v4
        with:
          path: ~\.pkg-cache
          key: pkg-cache-${{ runner.os }}

      - run: npm ci

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build standalone executable
        run: npm run build

      - name: Package ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path dist\emtypyie.exe -DestinationPath dist\emtypyie-cli-windows-x64-$version.zip -Force
          $hash = (Get-FileHash dist\emtypyie-cli-windows-x64-$version.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  dist\emtypyie-cli-windows-x64-$version.zip" | Out-File -FilePath dist\emtypyie-cli-windows-x64-$version.zip.sha256 -Encoding ascii

      - name: Upload Node.js ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: root4node/dist/emtypyie-cli-windows-x64-${{ steps.version.outputs.VERSION }}.zip*
          if-no-files-found: error

  build-c:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        working-directory: root4c

      - name: Build C native executable
        run: cmake --build build --config Release
        working-directory: root4c

      - name: Package ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $exe = "build\Release\emtypyie.exe"
          if (-not (Test-Path $exe)) { $exe = "build\emtypyie.exe" }
          Compress-Archive -Path $exe -DestinationPath "emtypyie-cli-native-windows-x64-$version.zip" -Force
          $hash = (Get-FileHash "emtypyie-cli-native-windows-x64-$version.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  emtypyie-cli-native-windows-x64-$version.zip" | Out-File -FilePath "emtypyie-cli-native-windows-x64-$version.zip.sha256" -Encoding ascii
        working-directory: root4c

      - name: Upload C native ZIP
        uses: actions/upload-artifact@v4
        with:
          name: c-build
          path: root4c/emtypyie-cli-native-windows-x64-${{ steps.version.outputs.VERSION }}.zip*
          if-no-files-found: error

  create-release:
    needs: [build-node, build-c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-build
          path: node-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: c-build
          path: c-artifacts

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            node-artifacts/*
            c-artifacts/*

  publish-npm:
    needs: build-node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: root4node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-winget:
    needs: build-c
    runs-on: windows-latest
    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download wingetcreate
        run: Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "wingetcreate.exe"

      - name: Submit update to winget-pkgs
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installerUrl = "https://github.com/myrachane/emtypyie-cli/releases/download/v$version/emtypyie-cli-native-windows-x64-$version.zip"
          .\wingetcreate.exe update myrachane.emtypyie-cli --version $version --urls $installerUrl --submit --token $env:GITHUB_TOKEN
